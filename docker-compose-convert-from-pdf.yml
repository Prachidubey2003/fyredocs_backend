services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chmod -R 777 /app/uploads /app/outputs"]
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    networks:
      - esydocs_net

  convert-from-pdf:
    build:
      context: ./convert-from-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL:-postgresql://neondb_owner:npg_K5jWhYGb7eJX@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require}
      REDIS_ADDR: redis:6379
      TRUSTED_PROXIES: 172.18.0.0/16,127.0.0.1,::1
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
    env_file:
      - ./convert-from-pdf/.env
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true
