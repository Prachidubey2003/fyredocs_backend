# Standalone run for auth-service. The service definition is extended from
# the canonical docker-compose.yml — do not duplicate config here; edit the
# main file and every per-service file picks it up.
#
# Shared infra (fyredocs_net network + db/redis/nats/minio) must already be
# running — start it via docker-compose.yml or docker-compose.essentials.yml.
#
# From the repo root:
#   docker compose -f deployment/docker-compose-auth-service.yml --env-file .env up -d --build
name: fyredocs

services:
  auth-service:
    extends:
      file: docker-compose.yml
      service: auth-service
    # Deps (db/redis/...) run from the main/essentials compose file — drop
    # the inherited depends_on so this file stands alone.
    depends_on: !reset []

networks:
  fyredocs_net:
    external: true
