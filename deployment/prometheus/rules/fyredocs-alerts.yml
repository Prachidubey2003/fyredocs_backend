# Fyredocs alerting rules. Kept intentionally small and high-signal — every rule
# here should be something worth waking a human for. Metric names come from
# shared/metrics (http_request_duration_seconds, jobs_processed_total,
# jobs_failed_total) and Prometheus' own `up`.
groups:
  - name: availability
    rules:
      - alert: ServiceDown
        expr: up{job="fyredocs-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Prometheus cannot scrape {{ $labels.instance }} (job={{ $labels.job }}) for over 1 minute."

      - alert: ObservabilityCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "otel-collector is down"
          description: "Trace ingestion is unavailable; metrics and logs are unaffected."

  - name: errors
    rules:
      # 5xx ratio per service over 5m. Fires when >5% of requests error for 5m.
      - alert: HighServerErrorRate
        expr: |
          (
            sum by (job) (rate(http_request_duration_seconds_count{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_request_duration_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $labels.job }} is serving >5% 5xx responses over the last 5 minutes."

  - name: latency
    rules:
      # p95 request latency SLO burn. Fires when p95 exceeds 2s for 10m.
      - alert: HighRequestLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency high on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 request latency has exceeded 2s for 10 minutes."

  - name: jobs
    rules:
      # Sustained job-processing failures across the PDF pipeline.
      - alert: HighJobFailureRate
        expr: sum(rate(jobs_failed_total[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated job failure rate"
          description: "Jobs are failing at >0.2/s (10m avg) across the pipeline — check the DLQ and worker logs."

      # Dead-lettered jobs are piling up in JOBS_DLQ (metric from analytics-service).
      - alert: DLQBacklog
        expr: nats_dlq_pending_messages > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead-letter queue backlog ({{ $value }} messages)"
          description: "JOBS_DLQ has held dead-lettered jobs for over 5 minutes. Investigate worker failures and redrive via POST /api/jobs/dlq/redrive."

  - name: dependencies
    rules:
      # A backing dependency (redis/nats/postgres) is unreachable from
      # analytics-service (metric from the ops-metrics poller).
      - alert: DependencyDown
        expr: dependency_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Dependency {{ $labels.dependency }} is unreachable"
          description: "analytics-service cannot reach {{ $labels.dependency }} for over 2 minutes."

  - name: database
    rules:
      # A service's connection pool is running out of headroom (in-use vs max).
      - alert: DBPoolNearExhaustion
        expr: |
          (
            db_pool_in_use_connections
            /
            db_pool_max_open_connections
          ) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB pool near exhaustion on {{ $labels.instance }}"
          description: "{{ $labels.instance }} has used >90% of its DB connection pool for 5 minutes — requests may start queueing/timing out."
