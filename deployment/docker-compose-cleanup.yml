name: fyredocs

services:
  cleanup-worker:
    build:
      context: ..
      dockerfile: job-service/Dockerfile.cleanup
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      UPLOAD_TTL: 30m
      CLEANUP_INTERVAL: 15m

      # Object storage (cleanup deletes objects by key; no shared volume)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}
    env_file:
      - ../.env
    networks:
      - fyredocs_net

networks:
  fyredocs_net:
    external: true
