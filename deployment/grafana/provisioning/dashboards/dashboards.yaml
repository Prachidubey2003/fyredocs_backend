# Grafana dashboard provider — loads JSON dashboards from disk at startup.

apiVersion: 1

providers:
  - name: fyredocs
    orgId: 1
    folder: fyredocs
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
