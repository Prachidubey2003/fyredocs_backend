# Grafana datasource provisioning — auto-loaded at startup.
# Prometheus (metrics, default) and Tempo (traces) on the internal network.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Enable the service/span filters in the Tempo query UI.
      nodeGraph:
        enabled: true
