# Grafana datasource provisioning — auto-loaded at startup.
# Prometheus (metrics, default), Tempo (traces), and Loki (logs), wired for
# trace ↔ log correlation both ways.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Enable the service/span filters in the Tempo query UI.
      nodeGraph:
        enabled: true
      # Trace → logs: from a span, jump to the matching Loki logs for that trace.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        filterBySpanID: false

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Log → trace: our logs are JSON with a `trace_id` field; extract it and
      # link to the matching Tempo trace.
      derivedFields:
        - name: trace_id
          matcherType: regex
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo
