services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chmod -R 777 /app/uploads /app/outputs"]
    volumes:
      - ../files/uploads:/app/uploads
      - ../files/outputs:/app/outputs
    networks:
      - fyredocs_net

  job-service:
    build:
      context: ..
      dockerfile: job-service/Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: ${DATABASE_URL:-postgresql://neondb_owner:npg_K5jWhYGb7eJX@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "fyredocs"
      JWT_AUDIENCE: "fyredocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth settings
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"
      AUTH_TRUST_GATEWAY_HEADERS: "false"

      # File Handling
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      MAX_UPLOAD_MB: "50"
      GUEST_JOB_TTL: 2h
      UPLOAD_TTL: 2h

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - ../job-service/.env
    volumes:
      - ../files/uploads:/app/uploads
      - ../files/outputs:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

networks:
  fyredocs_net:
    external: true

