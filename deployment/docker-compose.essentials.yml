name: fyredocs

services:
  # Local Postgres for the "infra only" dev workflow (services run via `go run`
  # on the host). The port is published so host processes reach it at
  # localhost:5432; set DATABASE_URL accordingly, e.g.
  #   postgresql://fyredocs:fyredocs@localhost:5432/fyredocs?sslmode=disable
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fyredocs}
      POSTGRES_USER: ${POSTGRES_USER:-fyredocs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fyredocs}
    # postgres:18+ expects the volume at /var/lib/postgresql (not .../data).
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fyredocs} -d ${POSTGRES_DB:-fyredocs}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fyredocs_net

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fyredocs_net

networks:
  fyredocs_net:
    name: fyredocs_net

volumes:
  postgres_data:
  redis_data:
