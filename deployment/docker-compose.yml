name: fyredocs

services:
  # ==================== INFRASTRUCTURE ====================

  # --- PostgreSQL commented out: using Neon cloud database ---
  # db:
  #   image: postgres:15-alpine
  #   restart: always
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-fyredocs}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-fyredocs}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '1.0'
  #       reservations:
  #         memory: 128M
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   networks:
  #     - fyredocs_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  nats:
    image: nats:2.10-alpine
    restart: always
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # ==================== OBJECT STORAGE (MinIO) ====================
  # All file bytes live here. Services talk to minio:9000 over the internal
  # network; browsers reach objects through the api-gateway's presigned-URL
  # proxy (/fyredocs-uploads/*, /fyredocs-outputs/*) — port 9000 is NOT
  # published. The console is bound to localhost only for operators.
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Admin console only, loopback only. Object traffic stays internal.
      - "127.0.0.1:9001:9001"
    healthcheck:
      # The minio image ships curl but not a standalone mc; the documented
      # liveness probe is the health endpoint.
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # One-shot bucket/lifecycle/user bootstrap. Runs to completion before any
  # service that touches object storage starts (depends_on:
  # service_completed_successfully). Idempotent — safe on every `up`.
  #
  # Lifecycle rules (uploads bucket only):
  #   - expire objects after 2 days (raw uploads are consumed into jobs
  #     quickly; anything older is abandoned)
  #   - abort incomplete multipart uploads after 1 day
  #   `mc ilm rule add` has no flag for AbortIncompleteMultipartUpload, so the
  #   full lifecycle document is applied via `mc ilm import`. The expiry-only
  #   equivalent would be: mc ilm rule add --expire-days 2 local/fyredocs-uploads
  #
  # NO lifecycle on the outputs bucket: pro-plan job outputs never expire —
  # output deletion is DB-driven (cleanup-worker removes objects when the
  # owning processing_jobs row expires).
  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-04-16T18-13-26Z}
    restart: "no"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        # Wait for MinIO to accept connections (alias set probes the server)
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "waiting for minio..."; sleep 1
        done

        # Create both buckets (-p: no error if they already exist)
        mc mb -p "local/$$S3_BUCKET_UPLOADS"
        mc mb -p "local/$$S3_BUCKET_OUTPUTS"

        # Lifecycle on the uploads bucket: expire after EXPIRE_DAYS, abort
        # incomplete multipart uploads after ABORT_DAYS (see header for why
        # ilm import rather than `mc ilm rule add`).
        echo '{"Rules":[{"ID":"expire-stale-uploads","Status":"Enabled","Filter":{"Prefix":""},"Expiration":{"Days":'"$$UPLOAD_EXPIRE_DAYS"'},"AbortIncompleteMultipartUpload":{"DaysAfterInitiation":'"$$UPLOAD_ABORT_INCOMPLETE_DAYS"'}}]}' \
          | mc ilm import "local/$$S3_BUCKET_UPLOADS"

        # Scoped application credentials: services never use the root key.
        # RW on the two fyredocs buckets only.
        cat > /tmp/fyredocs-app-policy.json <<POLICY
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetBucketLocation", "s3:ListBucket", "s3:ListBucketMultipartUploads"],
              "Resource": ["arn:aws:s3:::$$S3_BUCKET_UPLOADS", "arn:aws:s3:::$$S3_BUCKET_OUTPUTS"]
            },
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:AbortMultipartUpload", "s3:ListMultipartUploadParts"],
              "Resource": ["arn:aws:s3:::$$S3_BUCKET_UPLOADS/*", "arn:aws:s3:::$$S3_BUCKET_OUTPUTS/*"]
            }
          ]
        }
        POLICY
        mc admin user add local "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY"
        mc admin policy create local fyredocs-app /tmp/fyredocs-app-policy.json
        mc admin policy attach local fyredocs-app --user "$$S3_ACCESS_KEY" || true

        echo "minio-init complete"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}
      UPLOAD_EXPIRE_DAYS: ${UPLOAD_EXPIRE_DAYS:-2}
      UPLOAD_ABORT_INCOMPLETE_DAYS: ${UPLOAD_ABORT_INCOMPLETE_DAYS:-1}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JOB_SERVICE_URL: http://job-service:8081
      AUTH_SERVICE_URL: http://auth-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      DOCUMENT_SERVICE_URL: http://document-service:8089
      USER_SERVICE_URL: http://user-service:8090
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"

      # Object-storage proxy: presigned URLs resolve to this gateway origin
      # and are relayed verbatim (path + Host preserved) to MinIO.
      MINIO_URL: ${MINIO_URL:-http://minio:9000}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "fyredocs"
      JWT_AUDIENCE: "fyredocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth Configuration
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # SPA static file serving (frontend served from same origin)
      SPA_DIR: /app/frontend

      # CORS Configuration (kept for local dev when frontend runs separately)
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost:3000"
      CORS_ALLOW_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOW_HEADERS: "Authorization,Content-Type,X-User-ID"
      CORS_ALLOW_CREDENTIALS: "true"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    volumes:
      - ../../fyredocs_frontend/dist:/app/frontend:ro
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      job-service:
        condition: service_started
      analytics-service:
        condition: service_started
      document-service:
        condition: service_started
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - fyredocs_net

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: ..
      dockerfile: auth-service/Dockerfile
    restart: always
    environment:
      PORT: "8086"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "fyredocs"
      JWT_AUDIENCE: "fyredocs-api"
      JWT_CLOCK_SKEW: "60s"
      JWT_ACCESS_TTL: "8h"
      JWT_REFRESH_TTL: "168h"

      # Auth Cookie Settings
      AUTH_COOKIE_DOMAIN: ""
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: "lax"
      AUTH_REFRESH_COOKIE: "refresh_token"

      # Auth Denylist
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # Rate Limiting
      RATE_LIMIT_LOGIN: "5"
      RATE_LIMIT_SIGNUP: "3"
      RATE_LIMIT_REFRESH: "10"
      RATE_LIMIT_FORGOT_PASSWORD: "3"
      RATE_LIMIT_RESET_PASSWORD: "5"
      RATE_LIMIT_PROXY_LOGIN: "5"
      RATE_LIMIT_WINDOW: "60s"

      # Password Reset / Email (Resend)
      # Leave RESEND_API_KEY blank to fall back to the no-op mailer (logs the
      # reset link to stdout instead of sending an email).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESET_EMAIL_FROM: ${RESET_EMAIL_FROM:-no-reply@fyredocs.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      PASSWORD_RESET_TOKEN_TTL: "1h"

      # Proxy login (admin impersonation)
      PROXY_LOGIN_ENABLED: ${PROXY_LOGIN_ENABLED:-true}
      PROXY_LOGIN_TTL: ${PROXY_LOGIN_TTL:-30m}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8086/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== JOB SERVICE (formerly upload-service) ====================
  job-service:
    build:
      context: ..
      dockerfile: job-service/Dockerfile
    restart: always
    environment:
      PORT: "8081"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "fyredocs"
      JWT_AUDIENCE: "fyredocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth settings
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"
      AUTH_TRUST_GATEWAY_HEADERS: "false"

      # Object storage (MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}
      # Presigned URLs are signed for the origin browsers actually use (the
      # gateway). Multi-host: point this at the public origin instead.
      S3_PUBLIC_ENDPOINT: ${PUBLIC_ORIGIN:-http://localhost:8080}
      UPLOAD_PART_SIZE_MB: "${UPLOAD_PART_SIZE_MB:-8}"

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      GUEST_JOB_TTL: 30m
      FREE_JOB_TTL: 24h
      UPLOAD_TTL: 30m

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== CONVERT FROM PDF (worker) ====================
  convert-from-pdf:
    build:
      context: ..
      dockerfile: convert-from-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # Object storage (MinIO) — workers stream inputs/outputs; /tmp is the
      # only local scratch space (tmpfs below)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Parallel jobs per container (pdf2docx/LibreOffice are CPU-heavy)
      WORKER_CONCURRENCY: "2"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== CONVERT TO PDF (worker) ====================
  convert-to-pdf:
    build:
      context: ..
      dockerfile: convert-to-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8083"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # Object storage (MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      WORKER_CONCURRENCY: "2"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      # Horizontal scaling example: now that file state lives in MinIO (no
      # shared bind mount), workers scale by bumping replicas. NOTE the budget:
      # resource limits are PER REPLICA — 2 replicas x 1G/2cpu = 2G/4cpu.
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== ORGANIZE PDF (worker) ====================
  organize-pdf:
    build:
      context: ..
      dockerfile: organize-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8084"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # Object storage (MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      WORKER_CONCURRENCY: "4"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== OPTIMIZE PDF (worker) ====================
  optimize-pdf:
    build:
      context: ..
      dockerfile: optimize-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8085"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # Object storage (MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # OCR
      OCR_DEFAULT_LANGUAGE: ${OCR_DEFAULT_LANGUAGE:-eng}
      OCR_DEFAULT_DPI: ${OCR_DEFAULT_DPI:-150}

      # Parallel jobs per container (kept low — OCR parallelizes pages internally)
      WORKER_CONCURRENCY: "2"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== ANALYTICS SERVICE ====================
  analytics-service:
    build:
      context: ..
      dockerfile: analytics-service/Dockerfile
    restart: always
    environment:
      PORT: "8087"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8087/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== DOCUMENT SERVICE ====================
  document-service:
    build:
      context: ..
      dockerfile: document-service/Dockerfile
    restart: always
    environment:
      PORT: "8089"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      USER_SERVICE_URL: http://user-service:8090
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8089/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - fyredocs_net

  # ==================== USER SERVICE ====================
  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    restart: always
    environment:
      PORT: "8090"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # ==================== NOTIFICATION SERVICE ====================
  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    restart: always
    environment:
      PORT: "8091"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== CLEANUP WORKER ====================
  cleanup-worker:
    build:
      context: ..
      dockerfile: cleanup-worker/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      PORT: "8088"

      # Object storage (MinIO) — cleanup deletes objects, aborts stale
      # multipart uploads
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-fyredocs-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-fyredocs-outputs}

      UPLOAD_TTL: 30m
      CLEANUP_INTERVAL: 5m
      GUEST_JOB_TTL: 30m
      FREE_JOB_TTL: 24h

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

networks:
  fyredocs_net:
    name: fyredocs_net
    driver: bridge

volumes:
  # postgres_data:  # commented out: using Neon cloud database
  redis_data:
  nats_data:
  minio_data:
