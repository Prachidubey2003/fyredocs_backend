        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== OPTIMIZE PDF (worker) ====================
  optimize-pdf:
    build:
      context: ..
      dockerfile: optimize-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8085"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # Object storage (MinIO)
      S3_ENDPOINT: ${S3_ENDPOINT:-minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "${S3_USE_SSL:-false}"
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-uploads}
      S3_BUCKET_OUTPUTS: ${S3_BUCKET_OUTPUTS:-outputs}

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # OCR
      OCR_DEFAULT_LANGUAGE: ${OCR_DEFAULT_LANGUAGE:-eng}
      OCR_DEFAULT_DPI: ${OCR_DEFAULT_DPI:-150}
      # OCR page-worker pool. Unset → min(NumCPU, 4) to bound tesseract memory.
      # On a VS-32-class box (32 GB) raise to ~6 to speed up multi-page scans.
      OCR_MAX_WORKERS: "${OCR_MAX_WORKERS:-}"

      # Parallel jobs per container (kept low — OCR parallelizes pages internally)
      WORKER_CONCURRENCY: "${OPTIMIZE_PDF_CONCURRENCY:-2}"
      # Result cache (see convert-from-pdf). 0 disables.
      RESULT_CACHE_TTL_SECONDS: "${RESULT_CACHE_TTL_SECONDS:-3600}"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${OPTIMIZE_PDF_MEM_LIMIT:-1G}
          cpus: "${OPTIMIZE_PDF_CPU_LIMIT:-2.0}"
        reservations:
          memory: ${OPTIMIZE_PDF_MEM_RESERVATION:-512M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - fyredocs_net

  # ==================== ANALYTICS SERVICE ====================
  analytics-service:
    build:
      context: ..
      dockerfile: analytics-service/Dockerfile
    restart: always
    environment:
      PORT: "8087"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      # NATS HTTP monitoring endpoint (`-m 8222`), internal-only. Scraped by the
      # admin NATS dashboard tab (/admin/metrics/nats).
      NATS_MONITOR_URL: http://nats:8222
      # The admin dashboard scrapes the gateway; these must track API_GATEWAY_PORT.
      # SERVICE_URLS, when set, REPLACES the built-in default map (server_performance.go),
      # so every service is listed — only the api-gateway entry is parameterized.
      API_GATEWAY_METRICS_URL: http://api-gateway:${API_GATEWAY_PORT:-8080}/metrics
      SERVICE_URLS: "api-gateway=http://api-gateway:${API_GATEWAY_PORT:-8080},auth-service=http://auth-service:8086,job-service=http://job-service:8081,convert-from-pdf=http://convert-from-pdf:8082,convert-to-pdf=http://convert-to-pdf:8083,organize-pdf=http://organize-pdf:8084,optimize-pdf=http://optimize-pdf:8085"
      # Redis backs the short-TTL /api/dashboard response cache.
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8087/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${ANALYTICS_SERVICE_MEM_LIMIT:-256M}
          cpus: "${ANALYTICS_SERVICE_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${ANALYTICS_SERVICE_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== DOCUMENT SERVICE ====================
  document-service:
    build:
      context: ..
      dockerfile: document-service/Dockerfile
    restart: always
    environment:
      PORT: "8089"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      USER_SERVICE_URL: http://user-service:8090
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8089/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${DOCUMENT_SERVICE_MEM_LIMIT:-256M}
          cpus: "${DOCUMENT_SERVICE_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${DOCUMENT_SERVICE_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      user-service:
        condition: service_started
      # notification-service intentionally omitted: it is disabled by default
      # (notifications profile). notifyclient is best-effort (errors swallowed)
      # and NOTIFICATION_SERVICE_URL below still resolves when it is enabled.
    networks:
      - fyredocs_net

  # ==================== USER SERVICE ====================
  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    restart: always
    environment:
      PORT: "8090"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${USER_SERVICE_MEM_LIMIT:-256M}
          cpus: "${USER_SERVICE_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${USER_SERVICE_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== NOTIFICATION SERVICE ====================
  # Disabled by default via the `notifications` profile: a plain `docker compose
  # up -d` (and deploy.sh) does NOT start it, but `docker compose build` still
  # builds the image so it stays ready to enable. Runtime coupling is best-effort
  # (document-service's notifyclient swallows errors; the gateway only proxies
  # /api/notifications on demand), so the rest of the stack runs fine without it.
  # Enable later:
  #   docker compose -f deployment/docker-compose.yml --env-file .env --profile notifications up -d
  #   (or) ./deployment/deploy.sh notification-service
  notification-service:
    profiles: ["notifications"]
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    restart: always
    environment:
      PORT: "8091"
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      NATS_URL: nats://nats:4222
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD", "./healthcheck", "http://localhost:8091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${NOTIFICATION_SERVICE_MEM_LIMIT:-256M}
          cpus: "${NOTIFICATION_SERVICE_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${NOTIFICATION_SERVICE_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - fyredocs_net
  # ==================== DB BACKUP (offsite) ====================
  # Hourly pg_dump of the co-located Postgres, gzipped and pushed to an EXTERNAL
  # S3-compatible bucket via rclone (Cloudflare R2 recommended). This is the
  # disaster-recovery copy — the on-server volume/MinIO die with the server.
  db-backup:
    build:
      context: ..
      dockerfile: deployment/backup/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in deployment/.env}
      # rclone remote "dest" — configured entirely via env (no rclone.conf).
      RCLONE_CONFIG_DEST_TYPE: s3
      RCLONE_CONFIG_DEST_PROVIDER: ${BACKUP_S3_PROVIDER:-Cloudflare}
      RCLONE_CONFIG_DEST_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY}
      RCLONE_CONFIG_DEST_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_KEY}
      RCLONE_CONFIG_DEST_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      RCLONE_CONFIG_DEST_REGION: ${BACKUP_S3_REGION:-auto}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-postgres/}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-3600}
      BACKUP_RETAIN: ${BACKUP_RETAIN:-10}
      # true = back up only registered users' outputs (exclude guest jobs)
      BACKUP_FILES_REGISTERED_ONLY: ${BACKUP_FILES_REGISTERED_ONLY:-false}
      # Empty-source protection: skip (don't overwrite/prune) when source looks
      # wiped, and alert. See backup.sh.
      BACKUP_MIN_USERS: ${BACKUP_MIN_USERS:-1}
      BACKUP_MAX_DELETE: ${BACKUP_MAX_DELETE:-}
      BACKUP_ALERT_WEBHOOK_URL: ${BACKUP_ALERT_WEBHOOK_URL:-}
      # rclone remote "src" = local MinIO, for mirroring file buckets offsite.
      # Reuses the app's scoped MinIO creds (they can list+read the buckets).
      RCLONE_CONFIG_SRC_TYPE: s3
      RCLONE_CONFIG_SRC_PROVIDER: Minio
      RCLONE_CONFIG_SRC_ENDPOINT: http://minio:9000
      RCLONE_CONFIG_SRC_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      RCLONE_CONFIG_SRC_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      RCLONE_CONFIG_SRC_REGION: ${S3_REGION:-us-east-1}
      # Which MinIO buckets to mirror (space-separated; empty = DB-only backup).
      # Both by default so in-flight user inputs survive a host loss. Retention is
      # DB-driven via job-service cleanup (no MinIO lifecycle rule); set to
      # "outputs" to skip uploads.
      BACKUP_FILES_BUCKETS: ${BACKUP_FILES_BUCKETS:-outputs uploads}
      BACKUP_FILES_PREFIX: ${BACKUP_FILES_PREFIX:-minio/}
    # Env-driven so deploy.sh folds this sidecar into the 80% budget too; the
    # fallbacks equal the previous hardcoded values (backward compatible).
    deploy:
      resources:
        limits:
          memory: ${DB_BACKUP_MEM_LIMIT:-128M}
          cpus: "${DB_BACKUP_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${DB_BACKUP_MEM_RESERVATION:-32M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fyredocs_net

  # ==================== OBSERVABILITY ====================
  # Backing stack for the tracing/metrics the services already emit. Every
  # service below carries profiles: ["observability"], so a PLAIN
  # `docker compose up` skips them — but deployment/deploy.sh activates the
  # profile by default (COMPOSE_PROFILES=observability), so a normal deploy
  # brings them up. To start standalone / opt back in manually:
  #   docker compose --profile observability up -d
  # (and to opt OUT of a deploy: COMPOSE_PROFILES= ./deployment/deploy.sh)
  # When it is down, services' OTLP endpoint probe fails and tracing
  # self-disables cleanly (shared/telemetry probeEndpoint).
  #
  # Data flow:
  #   services --OTLP/HTTP :4318--> otel-collector --OTLP/gRPC :4317--> tempo
  #   prometheus --scrape /metrics--> services + otel-collector
  #   grafana --> Prometheus + Tempo datasources
  # UIs (Grafana, Prometheus) are bound loopback-only, like the MinIO console.

  # OTLP ingestion point. Receives spans over HTTP on 4318 (matches every
  # service's OTEL_EXPORTER_OTLP_ENDPOINT) and forwards them to Tempo.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    profiles: ["observability"]
    restart: always
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    deploy:
      resources:
        limits:
          memory: ${OTEL_COLLECTOR_MEM_LIMIT:-256M}
          cpus: "${OTEL_COLLECTOR_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${OTEL_COLLECTOR_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      tempo:
        condition: service_started
    networks:
      - fyredocs_net

  # Trace storage/query backend. Ingests from the collector over OTLP/gRPC
  # (:4317); Grafana queries it over HTTP (:3200).
  tempo:
    image: grafana/tempo:2.6.1
    profiles: ["observability"]
    restart: always
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    deploy:
      resources:
        limits:
          memory: ${TEMPO_MEM_LIMIT:-512M}
          cpus: "${TEMPO_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${TEMPO_MEM_RESERVATION:-128M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # Log aggregation backend — Alloy ships every container's stdout here; Grafana
  # queries it via the Loki datasource, with trace_id ↔ trace correlation. Free /
  # self-hosted, single-binary, filesystem storage. Console loopback-only.
  loki:
    image: grafana/loki:3.3.2
    profiles: ["observability"]
    restart: always
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    deploy:
      resources:
        limits:
          memory: ${LOKI_MEM_LIMIT:-512M}
          cpus: "${LOKI_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${LOKI_MEM_RESERVATION:-128M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # Log shipper — discovers running containers via the Docker socket (read-only),
  # tails their stdout, labels each stream by compose service + container name, and
  # pushes to Loki. Replaces per-container `docker logs` with central search.
  alloy:
    image: grafana/alloy:v1.5.1
    profiles: ["observability"]
    restart: always
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    deploy:
      resources:
        limits:
          memory: ${ALLOY_MEM_LIMIT:-256M}
          cpus: "${ALLOY_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${ALLOY_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      loki:
        condition: service_started
    networks:
      - fyredocs_net

  # Scrapes the /metrics endpoint of every service (see prometheus/prometheus.yml).
  # Console loopback-only for operators — never public.
  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["observability"]
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-512M}
          cpus: "${PROMETHEUS_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${PROMETHEUS_MEM_RESERVATION:-128M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - fyredocs_net

  # NOTE: no standalone Alertmanager container. Prometheus posts firing alerts
  # directly to analytics-service's built-in receiver (shared/discord), which
  # forwards them to Discord (DISCORD_WEBHOOK_URL). See prometheus.yml `alerting`.

  # Dashboards + trace explorer. Datasources (Prometheus, Tempo) and the
  # fyredocs-overview dashboard are auto-provisioned from ./grafana.
  # Served under /grafana via the Caddy edge and embedded in the admin SPA's
  # Observability tab. Loopback port kept for direct operator access.
  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Serve under the /grafana sub-path so the SPA can iframe it same-origin
      # through the Caddy edge (deployment/caddy/Caddyfile @grafana block).
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Drop Grafana's X-Frame-Options: deny and set CSP frame-ancestors to
      # 'self' so the same-origin iframe embed is allowed.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Anonymous read-only access: the embed renders with no second login.
      # Access is gated at the edge (Caddy forward_auth → gateway /admin/authz),
      # so only authenticated super-admins ever reach Grafana.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: ${GRAFANA_MEM_LIMIT:-256M}
          cpus: "${GRAFANA_CPU_LIMIT:-0.5}"
        reservations:
          memory: ${GRAFANA_MEM_RESERVATION:-64M}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    networks:
      - fyredocs_net

networks:
  fyredocs_net:
    name: fyredocs_net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  caddy_data:
  caddy_config:
  tempo_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alloy_data:
