version: '3.8'

services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs"]
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - esydocs_net

  convert-to-pdf:
    build:
      context: ./convert-to-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    env_file:
      - ./convert-to-pdf/.env
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.convert-to.rule=PathPrefix(`/api/convert-to-pdf`)"
      - "traefik.http.routers.convert-to.entrypoints=web"
      - "traefik.http.services.convert-to.loadbalancer.server.port=8083"
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true

volumes:
  uploads_data:
  outputs_data: