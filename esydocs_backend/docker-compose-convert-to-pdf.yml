services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs"]
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - esydocs_net

  convert-to-pdf:
    build:
      context: ./convert-to-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      TRUSTED_PROXIES: 172.18.0.0/16,127.0.0.1,::1
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
    env_file:
      - ./convert-to-pdf/.env
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true

volumes:
  uploads_data:
  outputs_data:
