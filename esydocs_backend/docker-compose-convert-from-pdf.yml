version: '3.8'

services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs"]
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - esydocs_net

  convert-from-pdf:
    build:
      context: ./convert-from-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
    env_file:
      - ./convert-from-pdf/.env
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true

volumes:
  uploads_data:
  outputs_data:
