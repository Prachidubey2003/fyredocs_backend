version: '3.8'

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      UPLOAD_SERVICE_URL: http://upload-service:8081
    depends_on:
      upload-service:
        condition: service_started
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true
