services:
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs"]
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - esydocs_net

  upload-service:
    build:
      context: ./upload-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      TRUSTED_PROXIES: 172.18.0.0/16,127.0.0.1,::1
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      MAX_UPLOAD_MB: "50"
      GUEST_JOB_TTL: 2h
      UPLOAD_TTL: 2h
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      QUEUE_PREFIX: queue
    env_file:
      - ./upload-service/.env
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true

volumes:
  uploads_data:
  outputs_data:
