version: '3.8'

services:
  backend:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      CONVERT_API_SECRET: ${CONVERT_API_SECRET}
    env_file:
      - .env
    volumes:
      - uploads_data:/root/uploads
      - outputs_data:/root/outputs
    networks:
      - esydocs_net

networks:
  esydocs_net:
    external: true

volumes:
  uploads_data:
  outputs_data:
