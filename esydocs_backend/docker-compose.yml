version: '3.8'

services:
  # ==================== ESSENTIALS ====================
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: esydocs
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d esydocs"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - esydocs_net

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - esydocs_net

  # ==================== VOLUME INITIALIZATION ====================
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs"]
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    networks:
      - esydocs_net

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      UPLOAD_SERVICE_URL: http://upload-service:8081
      CONVERT_FROM_PDF_URL: http://convert-from-pdf:8082
      CONVERT_TO_PDF_URL: http://convert-to-pdf:8083
      ORGANIZE_PDF_URL: http://organize-pdf:8084
      OPTIMIZE_PDF_URL: http://optimize-pdf:8085
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"

      # JWT Configuration (from environment or .env file)
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth Configuration
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # CORS Configuration
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost:3000"
      CORS_ALLOW_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOW_HEADERS: "Authorization,Content-Type,X-User-ID,X-Guest-Token"
      CORS_ALLOW_CREDENTIALS: "true"
    depends_on:
      redis:
        condition: service_started
      upload-service:
        condition: service_started
    networks:
      - esydocs_net

  # ==================== UPLOAD SERVICE ====================
  upload-service:
    build:
      context: ./upload-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"

      # JWT Configuration (from environment or .env file)
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"
      JWT_ACCESS_TTL: "15m"

      # Auth Cookie Settings
      AUTH_REFRESH_TTL: "720h"
      AUTH_REFRESH_COOKIE: "refresh_token"
      AUTH_COOKIE_DOMAIN: ""
      AUTH_COOKIE_SECURE: "false"  # Set to true in production with HTTPS
      AUTH_COOKIE_SAMESITE: "lax"

      # Auth Denylist
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # Rate Limiting
      RATE_LIMIT_LOGIN: "5"
      RATE_LIMIT_SIGNUP: "3"
      RATE_LIMIT_REFRESH: "10"
      RATE_LIMIT_WINDOW: "60s"

      # File Handling
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      MAX_UPLOAD_MB: "50"
      GUEST_JOB_TTL: 2h
      UPLOAD_TTL: 2h
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      QUEUE_PREFIX: queue
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== CONVERT FROM PDF SERVICE ====================
  convert-from-pdf:
    build:
      context: ./convert-from-pdf
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: "8082"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      # Using free open-source tools: pdfcpu, LibreOffice, Poppler (no API keys needed)
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== CONVERT TO PDF SERVICE ====================
  convert-to-pdf:
    build:
      context: ./convert-to-pdf
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: "8083"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      # Using free open-source tools: pdfcpu, LibreOffice, Poppler (no API keys needed)
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== ORGANIZE PDF SERVICE ====================
  organize-pdf:
    build:
      context: ./organize-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth settings
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"
      AUTH_TRUST_GATEWAY_HEADERS: "false"
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== OPTIMIZE PDF SERVICE ====================
  optimize-pdf:
    build:
      context: ./optimize-pdf
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      QUEUE_PREFIX: queue
      MAX_RETRIES: "3"
      PROCESSING_TIMEOUT: 30m
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth settings
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"
      AUTH_TRUST_GATEWAY_HEADERS: "false"

      # OCR settings
      OCR_DEFAULT_LANGUAGE: "eng"
      OCR_DEFAULT_DPI: "300"
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== CLEANUP WORKER ====================
  cleanup-worker:
    build:
      context: ./cleanup-worker
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/esydocs?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      UPLOAD_TTL: 2h
      CLEANUP_INTERVAL: 5m
      GUEST_JOB_TTL: 2h
      MAX_RETRIES: "3"
      QUEUE_PREFIX: queue
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

networks:
  esydocs_net:
    name: esydocs_net
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  outputs_data:
