services:
  # ==================== INFRASTRUCTURE ====================

  # --- PostgreSQL commented out: using Neon cloud database ---
  # db:
  #   image: postgres:15-alpine
  #   restart: always
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-esydocs}
  #     POSTGRES_USER: ${POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-esydocs}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '1.0'
  #       reservations:
  #         memory: 128M
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   networks:
  #     - esydocs_net

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - esydocs_net

  nats:
    image: nats:2.10-alpine
    restart: always
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - esydocs_net

  # ==================== VOLUME INITIALIZATION ====================
  volume-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 10001:10001 /app/uploads /app/outputs && chmod -R 755 /app/uploads /app/outputs"]
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    networks:
      - esydocs_net

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      JOB_SERVICE_URL: http://job-service:8081
      AUTH_SERVICE_URL: http://auth-service:8086
      ANALYTICS_SERVICE_URL: http://analytics-service:8087
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth Configuration
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # CORS Configuration
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://localhost:3000"
      CORS_ALLOW_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
      CORS_ALLOW_HEADERS: "Authorization,Content-Type,X-User-ID,X-Guest-Token"
      CORS_ALLOW_CREDENTIALS: "true"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      job-service:
        condition: service_started
      analytics-service:
        condition: service_started
    networks:
      - esydocs_net

  # ==================== AUTH SERVICE ====================
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    restart: always
    environment:
      PORT: "8086"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"
      JWT_ACCESS_TTL: "15m"

      # Auth Cookie Settings
      AUTH_REFRESH_TTL: "720h"
      AUTH_REFRESH_COOKIE: "refresh_token"
      AUTH_COOKIE_DOMAIN: ""
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: "lax"

      # Auth Denylist
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"

      # Rate Limiting
      RATE_LIMIT_LOGIN: "5"
      RATE_LIMIT_SIGNUP: "3"
      RATE_LIMIT_REFRESH: "10"
      RATE_LIMIT_WINDOW: "60s"

      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - esydocs_net

  # ==================== JOB SERVICE (formerly upload-service) ====================
  job-service:
    build:
      context: .
      dockerfile: job-service/Dockerfile
    restart: always
    environment:
      PORT: "8081"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222

      # JWT Configuration
      JWT_HS256_SECRET: ${JWT_HS256_SECRET}
      JWT_ALLOWED_ALGS: "HS256"
      JWT_ISSUER: "esydocs"
      JWT_AUDIENCE: "esydocs-api"
      JWT_CLOCK_SKEW: "60s"

      # Auth settings
      AUTH_GUEST_PREFIX: "guest"
      AUTH_GUEST_SUFFIX: "jobs"
      AUTH_DENYLIST_ENABLED: "true"
      AUTH_DENYLIST_PREFIX: "denylist:jwt"
      AUTH_TRUST_GATEWAY_HEADERS: "false"

      # File Handling
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      MAX_UPLOAD_MB: "50"
      GUEST_JOB_TTL: 2h
      UPLOAD_TTL: 2h

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== CONVERT FROM PDF (worker) ====================
  convert-from-pdf:
    build:
      context: .
      dockerfile: convert-from-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8082"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      nats:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== CONVERT TO PDF (worker) ====================
  convert-to-pdf:
    build:
      context: .
      dockerfile: convert-to-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8083"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      nats:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== ORGANIZE PDF (worker) ====================
  organize-pdf:
    build:
      context: .
      dockerfile: organize-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8084"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      nats:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== OPTIMIZE PDF (worker) ====================
  optimize-pdf:
    build:
      context: .
      dockerfile: optimize-pdf/Dockerfile
    restart: always
    environment:
      PORT: "8085"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      NATS_URL: nats://nats:4222
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # OCR settings
      OCR_DEFAULT_LANGUAGE: "eng"
      OCR_DEFAULT_DPI: "300"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      nats:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

  # ==================== ANALYTICS SERVICE ====================
  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    restart: always
    environment:
      PORT: "8087"
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      NATS_URL: nats://nats:4222
      TRUSTED_PROXIES: "172.18.0.0/16,127.0.0.1,::1"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - esydocs_net

  # ==================== CLEANUP WORKER ====================
  cleanup-worker:
    build:
      context: .
      dockerfile: cleanup-worker/Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ep-wandering-glitter-anyd1fj9-pooler.c-6.us-east-1.aws.neon.tech/${POSTGRES_DB:-neondb}?sslmode=require}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: "0"
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      UPLOAD_TTL: 2h
      CLEANUP_INTERVAL: 5m
      GUEST_JOB_TTL: 2h

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./files/uploads:/app/uploads
      - ./files/outputs:/app/outputs
    depends_on:
      redis:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully
    networks:
      - esydocs_net

networks:
  esydocs_net:
    name: esydocs_net
    driver: bridge

volumes:
  # postgres_data:  # commented out: using Neon cloud database
  redis_data:
  nats_data:
