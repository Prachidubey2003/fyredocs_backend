  /api/convert-from-pdf/{tool}/{id}/download:
    get:
      tags: [Convert From PDF]
      summary: Download the converted file
      description: |
        Redirects to a short-lived (5 minute) presigned object-storage URL for
        the output file of a completed job. The job must have status
        `completed` and the caller must own it. The presigned URL forces
        `Content-Disposition: attachment` with the computed output file name
        and the correct Content-Type. Follow the redirect to receive the file
        bytes directly from object storage.
      operationId: downloadConvertFromPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - <<: *jobIdParam
      responses:
        "302":
          description: Redirect to a presigned download URL (expires in 5 minutes)
          headers:
            Location:
              schema:
                type: string
                example: "http://localhost/outputs/outputs/<jobId>/document.docx?response-content-disposition=attachment%3B%20filename%3Ddocument.docx&X-Amz-Signature=..."
        "400":
          description: Job not yet completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "404":
          description: Job not found, not authorized, or the download link has expired (legacy pre-S3 output)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "500":
          $ref: "#/components/responses/InternalError"

