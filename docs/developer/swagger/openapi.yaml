openapi: 3.0.3
info:
  title: Fyredocs API
  description: |
    Fyredocs is a document processing platform that provides PDF conversion,
    optimization, and organization tools. All responses follow a unified
    envelope format (`APIResponse`) with consistent error handling.

    ## Authentication
    The API supports three authentication methods:
    - **BearerAuth** - JWT access token in the `Authorization: Bearer <token>` header (API clients).
    - **CookieAuth** - `access_token` HttpOnly cookie set on signup/login. Pair with `refresh_token` (Path=`/auth`) for silent rotation via `POST /auth/refresh`.
    - **GuestToken** - `guest_token` HttpOnly cookie issued automatically by the API gateway on first contact when no auth is present. The same cookie is sent on every subsequent request.

    Authenticated users get persistent job storage. Guest users get temporary
    jobs that expire after a configurable TTL.

    ## Presigned Multipart Uploads
    File bytes are uploaded directly to object storage (MinIO/S3) through
    presigned URLs — they never pass through the application services:
    1. `POST /api/upload/init` creates an S3 multipart upload and returns a
       presigned PUT URL for every part.
    2. The browser `PUT`s each part to its presigned URL and collects the
       returned `ETag` response headers.
    3. `GET /api/upload/{uploadId}/parts` re-presigns part URLs to resume an
       interrupted upload or refresh expired URLs.
    4. `POST /api/upload/{uploadId}/complete` finalizes the upload from the
       collected part ETags and verifies the true object size against the
       caller's plan limit.
    5. `DELETE /api/upload/{uploadId}` cancels an in-progress upload.

    The resulting `uploadId` is then passed when creating a processing job.

    The legacy chunk endpoint (`PUT /api/upload/{uploadId}/chunk`) is retired
    and always returns `410 UPLOAD_PROTOCOL_CHANGED`.

    ## Rate Limiting
    Two layers of rate limiting apply, both returning `429` with rate-limit
    headers (`X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`)
    and a `Retry-After` header:

    - **Auth endpoints** (`/auth/*`) are limited per IP by auth-service
      (`RATE_LIMIT_LOGIN`, `RATE_LIMIT_SIGNUP`, etc.).
    - **All `/api/*` endpoints** are limited at the gateway with a per-plan
      sliding window, keyed by authenticated user (or client IP for anonymous
      requests): `RATE_LIMIT_API_ANON` (default 30/min), `RATE_LIMIT_API_FREE`
      (default 120/min), `RATE_LIMIT_API_PRO` (default 600/min) per
      `RATE_LIMIT_API_WINDOW` (default 1m).
  version: 1.0.0
  contact:
    name: Fyredocs Team

servers:
  - url: http://localhost
    description: Fyredocs Caddy edge (local development)

tags:
  - name: Health
    description: Service health checks
  - name: Authentication
    description: User registration, login, logout, and profile
  - name: Uploads
    description: Presigned S3 multipart upload management (file bytes go browser → object storage directly)
  - name: Convert From PDF
    description: Convert PDF files to other formats (Word, Excel, PowerPoint, Image, OCR)
  - name: Convert To PDF
    description: Convert Office (Word/Excel/PowerPoint), HTML, and image files to PDF
  - name: Organize PDF
    description: Merge, split, reorder, and organize PDF pages
  - name: Optimize PDF
    description: Compress, repair, and OCR PDF files
  - name: Jobs
    description: Cross-tool job history and real-time status updates for authenticated users
  - name: Admin Analytics
    description: Admin dashboard metrics (requires super-admin role via JWT authentication)
  - name: Documents
    description: Persistent document library — documents, folders, tags, and exports (document-service)
  - name: Organizations
    description: Organizations, memberships, and RBAC (user-service)
  - name: Notifications
    description: Per-user in-app notification feed and live SSE bell (notification-service)

# ---------------------------------------------------------------------------
# Reusable path parameter and query parameter components
# ---------------------------------------------------------------------------
x-path-tool-convert-from: &toolConvertFromParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum:
      - pdf-to-image
      - pdf-to-img
      - pdf-to-pdfa
      - pdf-to-word
      - pdf-to-docx
      - pdf-to-excel
      - pdf-to-xlsx
      - pdf-to-ppt
      - pdf-to-powerpoint
      - pdf-to-pptx
      - pdf-to-html
      - pdf-to-text
      - pdf-to-txt
      - pdf-to-odt
      - pdf-to-ods
      - pdf-to-odp
  description: The conversion tool to use (canonical names + aliases — see convert-from-pdf/main.go AllowedTools)

x-path-tool-convert-to: &toolConvertToParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum:
      - word-to-pdf
      - excel-to-pdf
      - ppt-to-pdf
      - powerpoint-to-pdf
      - html-to-pdf
      - image-to-pdf
      - img-to-pdf
  description: The Office/Image → PDF tool to use (PDF-manipulation tools live under /api/organize-pdf and /api/optimize-pdf)

x-path-tool-organize: &toolOrganizeParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum:
      - merge-pdf
      - split-pdf
      - remove-pages
      - extract-pages
      - organize-pdf
      - scan-to-pdf
      - rotate-pdf
      - watermark-pdf
      - protect-pdf
      - unlock-pdf
      - sign-pdf
      - edit-pdf
      - add-page-numbers
  description: The PDF organization tool to use (13 tools — see organize-pdf/main.go AllowedTools)

x-path-tool-optimize: &toolOptimizeParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum: [compress-pdf, repair-pdf, ocr-pdf]
  description: The PDF optimization tool to use

x-path-job-id: &jobIdParam
  name: id
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: The job ID

x-query-page: &pageQuery
  name: page
  in: query
  schema:
    type: integer
    minimum: 1
    default: 1
  description: Page number for pagination

x-query-limit: &limitQuery
  name: limit
  in: query
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 25
  description: Number of items per page

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ==========================================================================
  # Health
  # ==========================================================================
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Returns the health status of the API gateway. Performs a Redis ping
        to verify connectivity. Returns 503 if Redis is unreachable.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  redis:
                    type: string
                    example: "connection refused"

  # ==========================================================================
  # Authentication
  # ==========================================================================
  /auth/plans:
    get:
      tags: [Authentication]
      summary: List subscription plans
      description: |
        Returns all non-anonymous subscription plans with their file size and
        file count limits. No authentication required.
      operationId: getPlans
      responses:
        "200":
          description: Plans retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plans:
                            type: array
                            items:
                              $ref: "#/components/schemas/SubscriptionPlan"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: |
        Creates a new user account and returns a JWT access token.
        The token is also set as an HTTP-only cookie.
        Password must be 8-128 characters.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Registration successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: USER_ALREADY_EXISTS
                          details: User already exists
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in with email and password
      description: |
        Authenticates a user and returns a JWT access token.
        The token is also set as an HTTP-only cookie.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: |
        Issues a new short-lived `access_token` cookie from a valid `refresh_token`
        cookie. The refresh token cookie is left unchanged — only the underlying
        `user_sessions` row's access-token hash is rotated. Rate-limited at
        `RATE_LIMIT_REFRESH` (default 10) per `RATE_LIMIT_WINDOW` (default 60s)
        per IP.
      operationId: refreshToken
      security: []  # auth comes from the refresh_token cookie itself
      responses:
        "200":
          description: New access token issued
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "access_token=eyJhbGc...; HttpOnly; Secure; SameSite=Lax; Max-Age=28800; Path=/"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          accessExpiresAt:
                            type: integer
                            format: int64
                            description: Access token expiry as unix milliseconds
        "401":
          description: Missing, expired, or unknown refresh token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: INVALID_REFRESH_TOKEN
                          details: Your session has expired. Please log in again.
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request a password reset link
      description: |
        Issues a single-use password reset token and emails it to the user as
        a magic link (`${APP_BASE_URL}/reset-password?token=<raw>`).

        Always returns 200 with the same generic message regardless of whether
        the email is registered — this prevents account enumeration.

        Rate-limited at `RATE_LIMIT_FORGOT_PASSWORD` (default 3) per
        `RATE_LIMIT_WINDOW` (default 60s) per IP.

        If `RESEND_API_KEY` is unset, the link is logged via `slog.Info` under
        `password_reset.email.noop` instead of being emailed (development).
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        "200":
          description: Reset link emailed if the email is registered (response is identical for unknown emails)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "If an account exists for this email, a reset link has been sent."
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Consume a password reset token and set a new password
      description: |
        Validates the single-use reset token, updates the user's bcrypt password
        hash, and revokes every active session for that user. Outstanding access
        tokens are added to the Redis denylist for the remainder of their TTL.

        The token is consumed (deleted) on success — replays return 400
        `INVALID_OR_EXPIRED_TOKEN`.

        Rate-limited at `RATE_LIMIT_RESET_PASSWORD` (default 5) per
        `RATE_LIMIT_WINDOW` (default 60s) per IP.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  description: Raw token from the magic link in the reset email
                  example: "K8nXkz4M-…43chars…"
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
                  example: "NewSecurePass123!"
      responses:
        "200":
          description: Password updated; user must sign in again
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "Password updated. Please sign in."
        "400":
          description: Validation error or invalid/expired token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: INVALID_OR_EXPIRED_TOKEN
                          details: This reset link is invalid or has expired. Please request a new one.
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user info
      description: Returns the authenticated user's profile under the `user` key.
      operationId: getMe
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/profile:
    get:
      tags: [Authentication]
      summary: Get current user profile
      description: Returns the authenticated user's profile under the `profile` key.
      operationId: getProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Log out the current user
      description: |
        Revokes the current access token by adding it to the denylist
        and clears the access_token cookie. Returns 204 No Content on success.
      operationId: logout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/proxy-login:
    post:
      tags: [Authentication]
      summary: Proxy login (admin impersonation)
      description: |
        Lets a caller with role `admin` or `super-admin` obtain a short-lived
        access token for another user. The issued token carries an
        `impersonated_by` claim, uses a short TTL (`PROXY_LOGIN_TTL`), and is
        **not** paired with a refresh token — it cannot be renewed and expires
        on its own. The access cookie is set to the target user's token and the
        action is audit-logged. Requires `PROXY_LOGIN_ENABLED=true`.
      operationId: proxyLogin
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
                  description: ID of the user to impersonate
      responses:
        "200":
          description: Impersonation session started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                          accessExpiresAt:
                            type: integer
                            format: int64
                            description: Access token expiry (epoch milliseconds)
                          impersonatedBy:
                            type: string
                            format: uuid
                            description: ID of the admin who started the session
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not an admin, or proxy login is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # Note: there is no /auth/guest endpoint. Guest sessions are managed entirely
  # by the API gateway via the `guest_token` HttpOnly cookie. The gateway issues
  # the cookie automatically on first contact and validates it against
  # `guest:{token}:jobs` in Redis on every subsequent request. No application
  # code needs to call a "create guest session" endpoint.

  # ==========================================================================
  # Uploads
  # ==========================================================================
  /api/upload/init:
    post:
      tags: [Uploads]
      summary: Initialize a presigned multipart upload
      description: |
        Creates an S3 multipart upload in the uploads bucket and returns a
        presigned PUT URL for every part. The browser uploads file bytes
        directly to object storage — they never pass through the application.
        The declared `fileSize` is validated against the caller's plan limit
        from the `X-User-Plan-Max-File-MB` header (default: 10 MB for
        anonymous users) **before** any URL is issued; the true object size is
        re-verified on complete.
      operationId: initUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInitRequest"
      responses:
        "201":
          description: Upload session created; presigned part URLs issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UploadInitResponse"
        "400":
          description: Invalid input, or the file would need more than 1000 parts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "413":
          description: Declared file size exceeds plan limit
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: FILE_TOO_LARGE
                          details: "File size exceeds the 25MB limit for your plan"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/parts:
    get:
      tags: [Uploads]
      summary: Re-presign part upload URLs
      description: |
        Returns fresh presigned PUT URLs for the requested part numbers of an
        in-progress upload — used to resume an interrupted upload or refresh
        expired URLs. When `partNumbers` is omitted, every part is re-presigned.
      operationId: getUploadParts
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
        - name: partNumbers
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated 1-based part numbers (e.g. "2,3"); all parts when omitted
      responses:
        "200":
          description: Part URLs re-presigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploadId:
                            type: string
                            format: uuid
                          partSize:
                            type: integer
                            format: int64
                          urlExpiresAt:
                            type: string
                            format: date-time
                          parts:
                            type: array
                            items:
                              $ref: "#/components/schemas/UploadPartURL"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: Upload session expired or not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/chunk:
    put:
      tags: [Uploads]
      summary: "[Retired] Upload a single chunk"
      deprecated: true
      description: |
        One-release migration stub for the retired chunk-streaming protocol.
        Always returns `410 Gone` with code `UPLOAD_PROTOCOL_CHANGED` so stale
        frontend bundles reload into the presigned multipart flow. This route
        will be removed in the next release.
      operationId: uploadChunk
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      responses:
        "410":
          description: Upload protocol changed — refresh the page
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: UPLOAD_PROTOCOL_CHANGED
                          details: "Please refresh the page to continue uploading."

  /api/upload/{uploadId}/status:
    get:
      tags: [Uploads]
      summary: Get upload session status
      description: Returns the session metadata of an in-progress upload.
      operationId: getUploadStatus
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      responses:
        "200":
          description: Upload status retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UploadStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/complete:
    post:
      tags: [Uploads]
      summary: Complete a presigned multipart upload
      description: |
        Finalizes the S3 multipart upload from the client-collected part ETags.
        The part count must equal `totalParts` from init. After completion the
        service stats the object and re-verifies the **true** size against the
        caller's plan limit — oversized objects are deleted and 413 returned.
      operationId: completeUpload
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadCompleteRequest"
      responses:
        "200":
          description: Upload completed and size-verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploadId:
                            type: string
                            format: uuid
                          fileName:
                            type: string
                          size:
                            type: integer
                            format: int64
                            description: True object size in bytes
                          complete:
                            type: boolean
                            example: true
        "400":
          description: Part count mismatch or object storage rejected the part list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: UPLOAD_INCOMPLETE
                          details: "Expected 3 uploaded parts but received 2. Please finish uploading all parts first."
        "413":
          description: True object size exceeds plan limit (object is deleted)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: FILE_TOO_LARGE
                          details: "File size exceeds the 25MB limit for your plan"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}:
    delete:
      tags: [Uploads]
      summary: Abort an in-progress upload
      description: |
        Cancels an in-progress upload: the S3 multipart upload is aborted
        (freeing stored parts) and the session is removed. Idempotent —
        aborting an unknown or expired session still returns 204.
      operationId: abortUpload
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      responses:
        "204":
          description: Upload aborted (or already gone)
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

