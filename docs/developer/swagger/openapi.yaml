  /auth/plan:
    put:
      tags: [Authentication]
      summary: Change user subscription plan
      description: |
        Updates the authenticated user's subscription plan. Validates the plan exists
        and publishes a `plan.changed` analytics event via NATS with oldPlan/newPlan metadata.
      operationId: changePlan
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planName]
              properties:
                planName:
                  type: string
                  example: pro
      responses:
        "200":
          description: Plan updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "400":
          description: Invalid plan name, same plan, or plan does not exist
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/metrics/business:
