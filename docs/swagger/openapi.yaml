openapi: 3.0.3
info:
  title: EsyDocs API
  description: |
    EsyDocs is a document processing platform that provides PDF conversion,
    optimization, and organization tools. All responses follow a unified
    envelope format (`APIResponse`) with consistent error handling.

    ## Authentication
    The API supports three authentication methods:
    - **BearerAuth** - JWT token in the `Authorization: Bearer <token>` header
    - **CookieAuth** - JWT token in the `access_token` HTTP-only cookie (set automatically on login/signup)
    - **GuestToken** - Temporary guest identifier via `X-Guest-Token` header or `guest_token` cookie

    Authenticated users get persistent job storage. Guest users get temporary
    jobs that expire after a configurable TTL (default 2 hours).

    ## Chunked Uploads
    Large files are uploaded via a chunked upload flow:
    1. `POST /api/upload/init` to create an upload session
    2. `PUT /api/upload/{uploadId}/chunk?index=N` to send each chunk
    3. `POST /api/upload/{uploadId}/complete` to assemble the file

    The resulting `uploadId` is then passed when creating a processing job.

    ## Rate Limiting
    Endpoints are rate-limited per IP. Rate limit headers are included in responses:
    - `X-RateLimit-Limit` - Maximum requests per window
    - `X-RateLimit-Remaining` - Remaining requests in current window
    - `X-RateLimit-Reset` - Unix timestamp when the window resets
  version: 1.0.0
  contact:
    name: EsyDocs Team

servers:
  - url: http://localhost:8080
    description: EsyDocs API Gateway (local development)

tags:
  - name: Health
    description: Service health checks
  - name: Authentication
    description: User registration, login, logout, and profile
  - name: Uploads
    description: Chunked file upload management
  - name: Convert From PDF
    description: Convert PDF files to other formats (Word, Excel, PowerPoint, Image, OCR)
  - name: Convert To PDF
    description: Convert other formats to PDF and PDF manipulation tools
  - name: Organize PDF
    description: Merge, split, reorder, and organize PDF pages
  - name: Optimize PDF
    description: Compress, repair, and OCR PDF files
  - name: Jobs
    description: Cross-tool job history and real-time status updates for authenticated users
  - name: Admin Analytics
    description: Admin dashboard metrics (requires super-admin role via JWT authentication)

# ---------------------------------------------------------------------------
# Reusable path parameter and query parameter components
# ---------------------------------------------------------------------------
x-path-tool-convert-from: &toolConvertFromParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum: [pdf-to-word, pdf-to-excel, pdf-to-powerpoint, pdf-to-image, ocr]
  description: The conversion tool to use

x-path-tool-convert-to: &toolConvertToParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum:
      - word-to-pdf
      - excel-to-pdf
      - powerpoint-to-pdf
      - image-to-pdf
      - merge-pdf
      - split-pdf
      - compress-pdf
      - protect-pdf
      - unlock-pdf
      - watermark-pdf
      - sign-pdf
      - edit-pdf
  description: The conversion/manipulation tool to use

x-path-tool-organize: &toolOrganizeParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum: [merge-pdf, split-pdf, remove-pages, extract-pages, organize-pdf, scan-to-pdf]
  description: The PDF organization tool to use

x-path-tool-optimize: &toolOptimizeParam
  name: tool
  in: path
  required: true
  schema:
    type: string
    enum: [compress-pdf, repair-pdf, ocr-pdf]
  description: The PDF optimization tool to use

x-path-job-id: &jobIdParam
  name: id
  in: path
  required: true
  schema:
    type: string
    format: uuid
  description: The job ID

x-query-page: &pageQuery
  name: page
  in: query
  schema:
    type: integer
    minimum: 1
    default: 1
  description: Page number for pagination

x-query-limit: &limitQuery
  name: limit
  in: query
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 25
  description: Number of items per page

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ==========================================================================
  # Health
  # ==========================================================================
  /healthz:
    get:
      tags: [Health]
      summary: Health check
      description: |
        Returns the health status of the API gateway. Performs a Redis ping
        to verify connectivity. Returns 503 if Redis is unreachable.
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy
                  redis:
                    type: string
                    example: "connection refused"

  # ==========================================================================
  # Authentication
  # ==========================================================================
  /auth/plans:
    get:
      tags: [Authentication]
      summary: List subscription plans
      description: |
        Returns all non-anonymous subscription plans with their file size and
        file count limits. No authentication required.
      operationId: getPlans
      responses:
        "200":
          description: Plans retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          plans:
                            type: array
                            items:
                              $ref: "#/components/schemas/SubscriptionPlan"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/signup:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: |
        Creates a new user account and returns a JWT access token.
        The token is also set as an HTTP-only cookie.
        Password must be 8-128 characters.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Registration successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: USER_ALREADY_EXISTS
                          details: User already exists
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in with email and password
      description: |
        Authenticates a user and returns a JWT access token.
        The token is also set as an HTTP-only cookie.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
                example: access_token=eyJ...; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token (deprecated)
      description: |
        This endpoint has been deprecated and always returns HTTP 410 Gone.
        Clients should log in again to obtain a new access token.
      operationId: refreshToken
      deprecated: true
      responses:
        "410":
          description: Endpoint deprecated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: ENDPOINT_DEPRECATED
                          details: Refresh tokens are no longer supported. Please login again to get a new access token.

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user info
      description: Returns the authenticated user's profile under the `user` key.
      operationId: getMe
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/profile:
    get:
      tags: [Authentication]
      summary: Get current user profile
      description: Returns the authenticated user's profile under the `profile` key.
      operationId: getProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          profile:
                            $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Log out the current user
      description: |
        Revokes the current access token by adding it to the denylist
        and clears the access_token cookie. Returns 204 No Content on success.
      operationId: logout
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/guest:
    post:
      tags: [Authentication]
      summary: Create a guest session
      description: |
        Generates a temporary guest token valid for 24 hours (configurable via
        `GUEST_SESSION_TTL` env). The token is stored in Redis using the key
        pattern `guest:{token}:jobs`. No authentication required.

        Send the returned `guest_token` in the `X-Guest-Token` request header
        (or `guest_token` cookie) to authenticate as a guest on subsequent
        API calls. All basic tools are accessible to guests.
      operationId: createGuestSession
      security: []
      responses:
        "200":
          description: Guest session created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          guest_token:
                            type: string
                            format: uuid
                            description: Guest token to use in X-Guest-Token header
                          expires_in:
                            type: integer
                            description: Token lifetime in seconds (default 86400)
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==========================================================================
  # Uploads
  # ==========================================================================
  /api/upload/init:
    post:
      tags: [Uploads]
      summary: Initialize a chunked upload
      description: |
        Creates a new upload session and returns an `uploadId`.
        Use this ID to upload individual chunks and complete the upload.
        The `fileSize` is validated against the caller's plan limit from the
        `X-User-Plan-Max-File-MB` header (default: 10 MB for anonymous users).
      operationId: initUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInitRequest"
      responses:
        "201":
          description: Upload initialized
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploadId:
                            type: string
                            format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          description: File exceeds plan size limit
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: FILE_TOO_LARGE
                          details: "file size exceeds your plan limit of 25 MB"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/chunk:
    put:
      tags: [Uploads]
      summary: Upload a single chunk
      description: |
        Uploads a single chunk for the given upload session.
        The `index` query parameter specifies the zero-based chunk index.
      operationId: uploadChunk
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
        - name: index
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
          description: Zero-based chunk index
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [chunk]
              properties:
                chunk:
                  type: string
                  format: binary
                  description: The chunk file data
      responses:
        "200":
          description: Chunk uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UploadStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/status:
    get:
      tags: [Uploads]
      summary: Get upload session status
      description: Returns the current status of a chunked upload session.
      operationId: getUploadStatus
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      responses:
        "200":
          description: Upload status retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UploadStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/upload/{uploadId}/complete:
    post:
      tags: [Uploads]
      summary: Complete a chunked upload
      description: |
        Assembles all uploaded chunks into a single file.
        All chunks must have been uploaded before calling this endpoint.
        Returns the `uploadId` and internal `storedPath`.
      operationId: completeUpload
      parameters:
        - name: uploadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The upload session ID
      responses:
        "200":
          description: Upload completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          uploadId:
                            type: string
                            format: uuid
                          storedPath:
                            type: string
        "400":
          description: Upload is incomplete (not all chunks received)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "413":
          description: Assembled file exceeds plan size limit
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      error:
                        $ref: "#/components/schemas/APIError"
                        example:
                          code: FILE_TOO_LARGE
                          details: "file size exceeds your plan limit of 25 MB"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ==========================================================================
  # Convert From PDF
  # ==========================================================================
  /api/convert-from-pdf/{tool}:
    post:
      tags: [Convert From PDF]
      summary: Create a conversion job (PDF to other format)
      description: |
        Creates a new processing job to convert a PDF to the specified format.
        Files can be submitted either as multipart form data or by referencing
        a previously completed chunked upload via `uploadId`.
      operationId: createConvertFromPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: |
            Optional idempotency key. If provided and a job was already created
            with this key within the last 10 minutes, the existing job is returned
            instead of creating a new one.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: PDF file(s) to convert. MIME content type is validated against the expected type for the tool.
                options:
                  type: string
                  description: JSON-encoded options object
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created and queued for processing (or existing job returned if Idempotency-Key matched)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProcessingJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Convert From PDF]
      summary: List jobs by tool
      description: Returns a paginated list of jobs for the specified conversion tool.
      operationId: listConvertFromPdfJobs
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - <<: *pageQuery
        - <<: *limitQuery
      responses:
        "200":
          description: Jobs retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProcessingJob"
                      meta:
                        $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/convert-from-pdf/{tool}/{id}:
    get:
      tags: [Convert From PDF]
      summary: Get a specific job
      description: Returns the details of a single conversion job.
      operationId: getConvertFromPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - <<: *jobIdParam
      responses:
        "200":
          description: Job retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProcessingJob"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Convert From PDF]
      summary: Delete a job
      description: |
        Deletes a job and its associated files (both input and output).
        Returns 204 No Content on success.
      operationId: deleteConvertFromPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - <<: *jobIdParam
      responses:
        "204":
          description: Job deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/convert-from-pdf/{tool}/{id}/download:
    get:
      tags: [Convert From PDF]
      summary: Download the converted file
      description: |
        Downloads the output file for a completed job.
        The job must have status `completed`. Returns the file as a binary
        attachment with the appropriate Content-Type header.
      operationId: downloadConvertFromPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertFromParam
        - <<: *jobIdParam
      responses:
        "200":
          description: File download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="document.docx"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.presentationml.presentation:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: Job not yet completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================================
  # Convert To PDF
  # ==========================================================================
  /api/convert-to-pdf/{tool}:
    post:
      tags: [Convert To PDF]
      summary: Create a conversion job (other format to PDF)
      description: |
        Creates a new processing job to convert a file to PDF or perform a
        PDF manipulation (merge, split, compress, protect, etc.).
        Files can be submitted as multipart form data or via `uploadId`.
      operationId: createConvertToPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertToParam
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: |
            Optional idempotency key. If provided and a job was already created
            with this key within the last 10 minutes, the existing job is returned
            instead of creating a new one.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: File(s) to convert to PDF. MIME content type is validated against the expected type for the tool.
                options:
                  type: string
                  description: JSON-encoded options object
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequest"
      responses:
        "201":
          description: Job created and queued for processing (or existing job returned if Idempotency-Key matched)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProcessingJob"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    get:
      tags: [Convert To PDF]
      summary: List jobs by tool
      description: Returns a paginated list of jobs for the specified tool.
      operationId: listConvertToPdfJobs
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertToParam
        - <<: *pageQuery
        - <<: *limitQuery
      responses:
        "200":
          description: Jobs retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProcessingJob"
                      meta:
                        $ref: "#/components/schemas/Meta"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/convert-to-pdf/{tool}/{id}:
    get:
      tags: [Convert To PDF]
      summary: Get a specific job
      description: Returns the details of a single job.
      operationId: getConvertToPdfJob
      security:
        - BearerAuth: []
        - CookieAuth: []
        - GuestToken: []
      parameters:
        - <<: *toolConvertToParam
